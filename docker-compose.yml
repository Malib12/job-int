services:
  api:
    build: .
    container_name: job_intelligence_api
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+psycopg2://app:app@db:5432/jobintelligence
    depends_on:
      - db

  db:
    image: postgres:16
    container_name: job_intelligence_db
    environment:
      - POSTGRES_USER=app
      - POSTGRES_PASSWORD=app
      - POSTGRES_DB=jobintelligence
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata: